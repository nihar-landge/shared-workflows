name: Docker CI Reusable

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SLACK_WEBHOOK:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Run Trivy Security Scan
        id: trivy                        # ← give it an ID
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true          # ← don't kill the job
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: 1

      # ✅ Only runs if ALL above steps passed
      - name: Slack Notify Success
        if: success() && steps.trivy.outcome == 'success'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Image *${{ inputs.image_name }}:${{ inputs.tag }}* built, pushed & scanned successfully!\"}"

      # ❌ Only runs if Trivy found vulnerabilities
      - name: Slack Notify Failure
        if: steps.trivy.outcome == 'failure'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Vulnerabilities found in *${{ inputs.image_name }}:${{ inputs.tag }}*. Check Trivy scan logs!\"}"
